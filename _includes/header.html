<header class='c-header'>

  <div class='o-grid'>
    <div class='o-grid__col o-grid__col--full'>
      <div class='c-header__inner'>

        <div class='o-grid'>
          <div class='o-grid__col o-grid__col--3-4-s'>
            <div class='c-logo u-text-left'>
              <img class="logo-image"
                   width="40"
                   src="/images/header-edi.jpg">
              <a class='c-logo__link' href='{{ site.baseurl }}/'>{{ site.title }}</a>
            </div>
          </div>

          <div class='o-grid__col o-grid__col--1-4-s'>
            <div class='c-header__actions'>
              <button class='js-theme-toggle c-theme-toggle' type='button' aria-label='Toggle dark mode' title='Toggle dark mode'>
                <svg class='c-theme-toggle__icon c-theme-toggle__icon--sun' aria-hidden='true' viewBox='0 0 24 24' fill='none'>
                  <path d='M12 4.75V3m0 18v-1.75M4.75 12H3m18 0h-1.75m-2.13-5.12 1.24-1.24M5.64 18.36l1.24-1.24m0-10.24L5.64 5.64m12.72 12.72-1.24-1.24' stroke='currentColor' stroke-width='1.8' stroke-linecap='round'/>
                  <circle cx='12' cy='12' r='4.25' stroke='currentColor' stroke-width='1.8'/>
                </svg>
                <svg class='c-theme-toggle__icon c-theme-toggle__icon--moon' aria-hidden='true' viewBox='0 0 24 24' fill='none'>
                  <path d='M20 14.35A7.4 7.4 0 0 1 9.65 4 8.1 8.1 0 1 0 20 14.35Z' stroke='currentColor' stroke-width='1.9' stroke-linejoin='round'/>
                </svg>
              </button>
              <label class='js-off-canvas-toggle c-off-canvas-toggle' aria-label='Toggle navigation'>
                <span class='c-off-canvas-toggle__icon'></span>
              </label>
            </div>
          </div>

          <div class='o-grid__col o-grid__col--1-4-s'>
            <div class='c-off-canvas-content'>
              <label class='js-off-canvas-toggle c-off-canvas-toggle c-off-canvas-toggle--close'>
                <span class='c-off-canvas-toggle__icon'></span>
              </label>

              <ul class='c-nav o-plain-list '>
                {% include navigation.html %}
              </ul>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

</header>
